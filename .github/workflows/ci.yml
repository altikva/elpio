name: ci

on:
  push:
    branches: [main]
  pull_request:

# Run Node-based actions on Node 24. Several actions we depend on (azure/setup-helm,
# arduino/setup-task, docker/*) have no Node-24 major yet; this opts them in and
# silences the Node 20 deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: pip install -e '.[dev]'
      - run: task lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: pip install -e '.[dev]'
      - run: task unit

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/elpio
      - run: helm template elpio deploy/helm/elpio --namespace elpio-system >/dev/null

  integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 5
      rabbitmq:
        image: rabbitmq:3
        ports: ["5672:5672"]
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping" --health-interval 10s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # NATS needs JetStream (-js), which service containers can't pass; run it directly.
      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 nats:2 -js
          sleep 3
      - run: pip install -e '.[dev,dispatcher]'
      - name: Run integration tests
        env:
          ELPIO_INTEGRATION: "1"
        run: pytest -m integration

  e2e:
    runs-on: ubuntu-latest
    # The keda-http scale-down test idles for ~5-6 min before it settles back to
    # zero, so give the whole job plenty of headroom.
    timeout-minutes: 25
    # Non-blocking for now: the suite covers both engines (Knative ksvc +
    # keda-http HTTPScaledObject) but a single operator only runs one engine at a
    # time, so we run the keda engine here and let the rest report without
    # failing the build. Flip this off once the suite is split per engine.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # kind-action makes the cluster (named "elpio-dev" by the config), so the
      # `task kind-up` step is skipped below and its sub-steps are run directly.
      - uses: helm/kind-action@v1
        with:
          config: tests/e2e/kind-config.yaml
      - run: pip install -e '.[dev]'
      - name: Install Knative + KEDA + keda-http add-on
        run: task knative-install keda-http-install
      - name: Apply the Elpio CRDs + operator RBAC
        run: |
          kubectl apply -f deploy/crds
          # rbac.yaml creates the elpio-system namespace; apply it before the
          # rest, since `kubectl apply -f <dir>` orders files alphabetically and
          # deployment.yaml (namespaced) would otherwise be applied first.
          kubectl apply -f deploy/operator/rbac.yaml
          kubectl apply -f deploy/operator
      - name: Run the operator locally (keda engine) in the background
        env:
          ELPIO_ENGINE: keda
        run: |
          nohup kopf run -m elpio.operator.handlers --standalone \
            >operator.log 2>&1 &
          # Give the operator a moment to start watching before the tests apply CRs.
          sleep 10
      - name: Run e2e tests
        env:
          ELPIO_E2E: "1"
        run: task e2e
      - name: Operator log (on failure)
        if: failure()
        run: cat operator.log || true
