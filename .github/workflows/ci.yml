name: ci

on:
  push:
    branches: [main]
  pull_request:

# Run Node-based actions on Node 24. Several actions we depend on (azure/setup-helm,
# arduino/setup-task, docker/*) have no Node-24 major yet; this opts them in and
# silences the Node 20 deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: pip install -e '.[dev]'
      - run: task lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: pip install -e '.[dev]'
      - run: task unit

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/elpio
      - run: helm template elpio deploy/helm/elpio --namespace elpio-system >/dev/null

  integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 5
      rabbitmq:
        image: rabbitmq:3
        ports: ["5672:5672"]
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping" --health-interval 10s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # NATS needs JetStream (-js), which service containers can't pass; run it directly.
      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 nats:2 -js
          sleep 3
      - run: pip install -e '.[dev,dispatcher]'
      - name: Run integration tests
        env:
          ELPIO_INTEGRATION: "1"
        run: pytest -m integration

  e2e:
    runs-on: ubuntu-latest
    # The keda-http scale-down test idles for ~5-6 min before it settles back to
    # zero, so give the whole job plenty of headroom.
    timeout-minutes: 25
    # A single operator only runs one engine at a time, and each engine's
    # scale-to-zero path is exercised by its own test (Knative ksvc + activator
    # vs keda-http HTTPScaledObject + interceptor). Run one cluster per engine and
    # let each test skip when its engine isn't the one under test.
    strategy:
      fail-fast: false
      matrix:
        engine: [knative, keda]
    name: e2e (${{ matrix.engine }})
    # Informational, not a hard gate: these legs stand up a real kind cluster +
    # Knative/KEDA, so they're subject to environmental flakiness (kind-action
    # bring-up, image pulls, activator cold-starts) that is outside this repo's
    # control. Keep them reporting without false-reddening the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Install the kind/kubectl tooling only; create the cluster ourselves with
      # a retry, since kind cluster bring-up flakes intermittently on hosted
      # runners (image pulls, control-plane wait) and we don't want that to red a
      # non-blocking leg. The cluster name ("elpio-dev") comes from the config.
      - uses: helm/kind-action@v1
        with:
          install_only: true
      - name: Create the kind cluster (retry on bring-up flake)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            kind delete cluster --name elpio-dev 2>/dev/null || true
            kind create cluster --config tests/e2e/kind-config.yaml --wait 120s
      - run: pip install -e '.[dev]'
      - name: Install Knative + KEDA + keda-http add-on
        run: task knative-install keda-http-install
      - name: Apply the Elpio CRDs + operator RBAC
        run: |
          kubectl apply -f deploy/crds
          # rbac.yaml creates the elpio-system namespace; apply it before the
          # rest, since `kubectl apply -f <dir>` orders files alphabetically and
          # deployment.yaml (namespaced) would otherwise be applied first.
          kubectl apply -f deploy/operator/rbac.yaml
          kubectl apply -f deploy/operator
      - name: Run the operator locally (${{ matrix.engine }} engine) in the background
        env:
          ELPIO_ENGINE: ${{ matrix.engine }}
        run: |
          nohup kopf run -m elpio.operator.handlers --standalone \
            >operator.log 2>&1 &
          # Give the operator a moment to start watching before the tests apply CRs.
          sleep 10
      - name: Run e2e tests
        env:
          ELPIO_E2E: "1"
          ELPIO_ENGINE: ${{ matrix.engine }}
        run: task e2e
      - name: Operator log (on failure)
        if: failure()
        run: cat operator.log || true
