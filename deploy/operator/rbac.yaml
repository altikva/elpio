apiVersion: v1
kind: Namespace
metadata:
  name: elpio-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elpio-operator
  namespace: elpio-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elpio-operator
rules:
  # Elpio CRs + status
  - apiGroups: ["elpio.io"]
    resources: ["elpioservices", "elpiofunctions", "elpiotasks"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["elpio.io"]
    resources: ["elpioservices/status", "elpiofunctions/status", "elpiotasks/status"]
    verbs: ["get", "patch", "update"]
  # Knative Serving (default engine)
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # KEDA (alternative engine)
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Built-ins used by the KEDA path + GC
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # kopf bookkeeping
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elpio-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elpio-operator
subjects:
  - kind: ServiceAccount
    name: elpio-operator
    namespace: elpio-system
