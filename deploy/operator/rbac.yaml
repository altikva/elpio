apiVersion: v1
kind: Namespace
metadata:
  name: elpio-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elpio-operator
  namespace: elpio-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elpio-operator
rules:
  # Elpio CRs + status
  - apiGroups: ["elpio.io"]
    resources: ["elpioservices", "elpiofunctions", "elpiotasks", "elpiotenants"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: ["elpio.io"]
    resources:
      ["elpioservices/status", "elpiofunctions/status", "elpiotasks/status", "elpiotenants/status"]
    verbs: ["get", "patch", "update"]
  # Tenant guardrails: namespaces + the namespaced objects a Tenant renders
  - apiGroups: [""]
    resources: ["namespaces", "serviceaccounts", "secrets", "resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "bind", "escalate"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ElpioFunction build pipeline (Tekton)
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ElpioTask scheduled dispatch
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Knative Serving (default engine)
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # KEDA (alternative engine)
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Built-ins used by the KEDA path + GC
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # kopf bookkeeping
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elpio-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elpio-operator
subjects:
  - kind: ServiceAccount
    name: elpio-operator
    namespace: elpio-system
