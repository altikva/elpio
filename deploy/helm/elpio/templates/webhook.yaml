{{- if .Values.webhook.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elpio.labels" . | nindent 4 }}
    app: elpio-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elpio-webhook
  template:
    metadata:
      labels:
        app: elpio-webhook
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: webhook
          image: {{ include "elpio.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "elpio.webhook.server:app", "--host", "0.0.0.0", "--port", "8443",
                    "--ssl-keyfile", "/tls/tls.key", "--ssl-certfile", "/tls/tls.crt"]
          env:
            - name: ELPIO_ALLOWED_REGISTRIES
              value: {{ .Values.webhook.allowedRegistries | quote }}
          ports:
            - containerPort: 8443
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: {{ .Release.Name }}-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elpio.labels" . | nindent 4 }}
spec:
  selector:
    app: elpio-webhook
  ports:
    - port: 443
      targetPort: 8443
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-selfsigned
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-webhook-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Release.Name }}-webhook-tls
  dnsNames:
    - {{ .Release.Name }}-webhook.{{ .Release.Namespace }}.svc
    - {{ .Release.Name }}-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ .Release.Name }}-selfsigned
    kind: Issuer
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ .Release.Name }}-service-defaults
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ .Release.Name }}-webhook-tls
webhooks:
  - name: services.elpio.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: {{ .Release.Name }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate
        port: 443
    rules:
      - apiGroups: ["elpio.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["elpioservices"]
        scope: Namespaced
{{- end }}
