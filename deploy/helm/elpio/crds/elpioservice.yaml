apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: elpioservices.elpio.io
spec:
  group: elpio.io
  scope: Namespaced
  names:
    kind: ElpioService
    plural: elpioservices
    singular: elpioservice
    shortNames:
      - esvc
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.ready
        - name: Engine
          type: string
          jsonPath: .status.engine
        - name: URL
          type: string
          jsonPath: .status.url
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [image]
              properties:
                image:
                  description: Container image (object or "repo:tag" string).
                  type: object
                  required: [repository]
                  properties:
                    repository: { type: string }
                    tag: { type: string }
                port:
                  type: integer
                  default: 8080
                env:
                  type: array
                  description: >-
                    Container env vars. Each entry sets either a literal value or
                    a valueFrom reference to a Secret/ConfigMap key.
                  items:
                    type: object
                    required: [name]
                    properties:
                      name: { type: string }
                      value: { type: string }
                      valueFrom:
                        type: object
                        properties:
                          secretKeyRef:
                            type: object
                            required: [name, key]
                            properties:
                              name: { type: string }
                              key: { type: string }
                              optional: { type: boolean }
                          configMapKeyRef:
                            type: object
                            required: [name, key]
                            properties:
                              name: { type: string }
                              key: { type: string }
                              optional: { type: boolean }
                envFrom:
                  type: array
                  description: Bulk-inject every key of a Secret or ConfigMap.
                  items:
                    type: object
                    properties:
                      prefix: { type: string }
                      secretRef:
                        type: object
                        required: [name]
                        properties:
                          name: { type: string }
                          optional: { type: boolean }
                      configMapRef:
                        type: object
                        required: [name]
                        properties:
                          name: { type: string }
                          optional: { type: boolean }
                externalSecrets:
                  type: array
                  description: >-
                    Sync secrets from an external store via the External Secrets
                    Operator into a k8s Secret that env/envFrom can consume.
                  items:
                    type: object
                    required: [name, storeRef]
                    properties:
                      name: { type: string }
                      storeRef: { type: string }
                      storeKind:
                        type: string
                        enum: [SecretStore, ClusterSecretStore]
                        default: SecretStore
                      secretName: { type: string }
                      refreshInterval: { type: string, default: "1h" }
                      data:
                        type: array
                        items:
                          type: object
                          required: [secretKey, remoteKey]
                          properties:
                            secretKey: { type: string }
                            remoteKey: { type: string }
                            remoteProperty: { type: string }
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu: { type: string }
                        memory: { type: string }
                    limits:
                      type: object
                      properties:
                        cpu: { type: string }
                        memory: { type: string }
                readinessProbe:
                  type: object
                  properties:
                    path: { type: string, default: "/" }
                    initialDelaySeconds: { type: integer }
                    periodSeconds: { type: integer }
                scaling:
                  type: object
                  description: Cloud Run-style autoscaling. Defaults to scale-to-zero.
                  properties:
                    minScale: { type: integer, default: 0 }
                    maxScale: { type: integer, default: 0 }
                    target: { type: integer, default: 100 }
                    metric:
                      type: string
                      enum: [concurrency, rps, cpu]
                      default: concurrency
                ingress:
                  type: object
                  properties:
                    enabled: { type: boolean, default: true }
                    visibility:
                      type: string
                      enum: [external, cluster-local]
                      default: external
                    host: { type: string }
                    tls: { type: boolean, default: false }
                serviceAccount: { type: string }
                traffic:
                  type: array
                  description: >-
                    Knative-style traffic split across revisions. Each entry
                    sends percent of requests to a named revision or the latest
                    ready one; percents must sum to 100. Knative engine only.
                  items:
                    type: object
                    required: [percent]
                    properties:
                      revisionName: { type: string }
                      latestRevision: { type: boolean }
                      percent:
                        type: integer
                        minimum: 0
                        maximum: 100
                      tag: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                ready: { type: boolean }
                engine: { type: string }
                url: { type: string }
                observedGeneration: { type: integer }
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string }
                      status: { type: string }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime: { type: string }
