# Default values for the Elpio chart.

# Serving engine the operator renders to: "knative" (default) or "keda".
engine: knative

image:
  repository: ghcr.io/altikva/elpio
  tag: ""            # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

operator:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Admission webhook (defaults ElpioService to scale-to-zero, enforces image
# policy). Requires cert-manager in the cluster.
webhook:
  enabled: true
  # Comma-separated list of allowed image registry prefixes. Empty (the default)
  # means ALL registries are accepted, so the base install does not restrict
  # images. Production installs should set an explicit allowlist, for example:
  # "ghcr.io/altikva,registry.mycorp.io".
  allowedRegistries: ""

# ElpioFunction build support: installs the elpio-buildpacks Tekton Pipeline.
# Needs Tekton Pipelines in the cluster. Off by default.
functions:
  enabled: false

# Management API / fleet tier (FastAPI). Off by default.
api:
  enabled: false
  replicaCount: 1
  oidc:
    jwksUri: ""
    issuer: ""
    audience: ""

# Spero, the sibling Altikva self-healing agent that supervises Elpio's CRs by
# reading their status.conditions and running remediations (e.g. unpausing a
# stuck KEDA ScaledObject). Off by default; enable to run it in-cluster.
spero:
  enabled: false
  image: ghcr.io/altikva/spero:latest
  # Namespace Spero runs in. Defaults to the release namespace; set to deploy it
  # somewhere else, e.g. "spero-system".
  namespace: ""
  # Name of an existing ConfigMap holding Spero's policy config, mounted into the
  # Deployment. Empty means Spero uses its built-in defaults.
  policyConfigMap: ""

rbac:
  create: true

serviceAccount:
  name: elpio-operator
