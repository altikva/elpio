# ElpioFunction — source → container (Cloud Functions equivalent). Phase 3.
# Stub CRD: a Tekton + Cloud Native Buildpacks pipeline builds the source into an
# image, then produces an ElpioService. Schema intentionally permissive for now.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: elpiofunctions.elpio.io
spec:
  group: elpio.io
  scope: Namespaced
  names:
    kind: ElpioFunction
    plural: elpiofunctions
    singular: elpiofunction
    shortNames:
      - efn
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [source, runtime]
              properties:
                source:
                  type: object
                  description: Where the function source comes from.
                  properties:
                    git: { type: string }
                    archive: { type: string }
                runtime:
                  type: string
                  description: Buildpack/runtime (e.g. python, node, go).
                entrypoint: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
