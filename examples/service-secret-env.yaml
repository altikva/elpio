# Secret-backed env for an ElpioService: literal + Secret/ConfigMap refs,
# bulk envFrom, and a Secret synced from an external store (External Secrets
# Operator). The synced Secret is then referenced like any other.
apiVersion: elpio.io/v1alpha1
kind: ElpioService
metadata:
  name: api
  namespace: demo
spec:
  image: ghcr.io/acme/api:1.4.0
  env:
    - name: LOG_LEVEL
      value: info
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-creds        # synced by the externalSecret below
          key: password
    - name: FEATURE_FLAGS
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: flags
  envFrom:
    - secretRef:
        name: app-secrets
    - configMapRef:
        name: app-config
      prefix: CFG_
  externalSecrets:
    - name: db-creds
      storeRef: vault
      storeKind: ClusterSecretStore
      refreshInterval: 1h
      data:
        - secretKey: password
          remoteKey: prod/db
          remoteProperty: pw
